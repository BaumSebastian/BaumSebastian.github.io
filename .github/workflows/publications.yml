name: Refresh publications

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}    # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ORCID: "0009-0001-0604-8764"
      # Fallback if ORCID is ever emptied; this id was verified to be yours.
      S2_AUTHOR_ID: "2257978487"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch publications
        run: python scripts/fetch_publications.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: refresh publications.json"
          git push
